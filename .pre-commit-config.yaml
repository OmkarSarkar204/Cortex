repos:
  - repo: https://github.com/pycqa/pylint
    rev: v3.2.6
    hooks:
      - id: pylint
        name: pylint (core package only)
        files: ^(cortex/|tests/)
        args:
          - "--disable=missing-module-docstring"
          - "--disable=missing-class-docstring"
          - "--disable=missing-function-docstring"
          - "--disable=import-error"